<div class="container">
  <div *ngIf="renderPhase === 'loading'" class="loading-overlay">
    <ng-container *ngIf="loadingTemplate; else defaultLoadingTemplate">
      <ng-container *ngTemplateOutlet="loadingTemplate; context: loadingTemplateContext"></ng-container>
    </ng-container>
    <ng-template #defaultLoadingTemplate>{{ loadingText }}</ng-template>
  </div>
  <div *ngIf="renderPhase === 'error'" class="error-overlay">
    <ng-container *ngIf="errorTemplate; else defaultErrorTemplate">
      <ng-container *ngTemplateOutlet="errorTemplate; context: errorTemplateContext"></ng-container>
    </ng-container>
    <ng-template #defaultErrorTemplate>
      <div>
        <div>{{ displayedErrorText }}</div>
        <div *ngIf="configuredViewer" style="margin-top: 8px; color: #475569;">
          Viewer: {{ configuredViewer }}
        </div>
        <div *ngIf="failedUrl" style="margin-top: 4px; color: #64748b; font-size: 12px; word-break: break-word;">
          {{ failedUrl }}
        </div>
        <ng-container *ngIf="errorActionsTemplate; else defaultErrorActions">
          <ng-container *ngTemplateOutlet="errorActionsTemplate; context: errorTemplateContext"></ng-container>
        </ng-container>
        <ng-template #defaultErrorActions>
          <button
            type="button"
            (click)="retryLoad()"
            style="margin-top: 14px; border: 1px solid #fecaca; background: #fff; color: #991b1b; border-radius: 999px; padding: 8px 14px; font: inherit; cursor: pointer;"
          >
            {{ retryButtonText }}
          </button>
        </ng-template>
      </div>
    </ng-template>
  </div>

  <ng-container *ngIf="!externalViewer">
    <div *ngIf="configuredViewer !== 'pdf'" class="inline-document-shell">
      <div class="inline-document-page" [innerHTML]="docHtml"></div>
    </div>
    <object
      (load)="objectLoaded()"
      *ngIf="fullUrl && configuredViewer === 'pdf'"
      [data]="fullUrl"
      type="application/pdf"
      width="100%"
      height="100%"
    >
      <p>
        Your browser does not support PDFs.
        <a [href]="fullUrl">Download the PDF</a>.
      </p>
    </object>
  </ng-container>

  <ng-container *ngIf="externalViewer">
    <iframe
      (load)="iframeLoaded()"
      *ngIf="fullUrl && showIframe && disableContent === 'none'"
      #iframe
      id="iframe-doc-viewer"
      frameBorder="0"
      [src]="fullUrl"
    ></iframe>
    <div class="container" *ngIf="disableContent !== 'none'">
      <div
        [class.overlay-full]="disableContent === 'all'"
        [class.overlay-popout-google]="
          configuredViewer === 'google' &&
          (disableContent === 'popout' || disableContent === 'popout-hide')
        "
        [class.overlay-popout-office]="
          configuredViewer === 'office' &&
          (disableContent === 'popout' || disableContent === 'popout-hide')
        "
        [style.background-color]="
          disableContent === 'popout-hide' ? '#fff' : 'transparent'
        "
      ></div>
      <iframe
        (load)="iframeLoaded()"
        *ngIf="fullUrl && showIframe"
        #iframe
        id="iframe"
        frameBorder="0"
        [src]="fullUrl"
      ></iframe>
    </div>
  </ng-container>
</div>
